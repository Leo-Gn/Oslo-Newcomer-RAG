<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Lunar horizon in deep space">
  <rect width="1920" height="1080" fill="#020308"/>
  <defs>
    <radialGradient id="earthGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f6fbff"/>
      <stop offset=".42" stop-color="#78b9ff"/>
      <stop offset=".75" stop-color="#12345d"/>
      <stop offset="1" stop-color="#020308" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="24%" r="76%">
      <stop offset="0" stop-color="#b8b8b6"/>
      <stop offset=".34" stop-color="#77797c"/>
      <stop offset=".62" stop-color="#2d2f34"/>
      <stop offset=".86" stop-color="#07080b"/>
      <stop offset="1" stop-color="#010205"/>
    </radialGradient>
    <linearGradient id="moonShade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".16"/>
      <stop offset=".52" stop-color="#000000" stop-opacity=".06"/>
      <stop offset="1" stop-color="#000000" stop-opacity=".72"/>
    </linearGradient>
    <filter id="soften">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>
  <circle cx="545" cy="292" r="74" fill="url(#earthGlow)" opacity=".9"/>
  <circle cx="568" cy="310" r="88" fill="#020308" opacity=".78"/>
  <ellipse cx="960" cy="1040" rx="940" ry="760" fill="url(#moon)" filter="url(#soften)"/>
  <ellipse cx="960" cy="1040" rx="940" ry="760" fill="url(#moonShade)"/>
  <g fill="none" stroke="#d7d7d4" stroke-opacity=".11" stroke-width="3">
    <circle cx="505" cy="585" r="14"/>
    <circle cx="640" cy="548" r="8"/>
    <circle cx="742" cy="621" r="18"/>
    <circle cx="900" cy="540" r="10"/>
    <circle cx="1055" cy="604" r="22"/>
    <circle cx="1220" cy="552" r="12"/>
    <circle cx="1370" cy="630" r="18"/>
    <circle cx="1510" cy="590" r="10"/>
    <circle cx="836" cy="705" r="12"/>
    <circle cx="1134" cy="724" r="15"/>
    <circle cx="1294" cy="760" r="9"/>
  </g>
  <g fill="#000000" opacity=".24">
    <circle cx="812" cy="584" r="16"/>
    <circle cx="1168" cy="622" r="25"/>
    <circle cx="1438" cy="674" r="19"/>
    <circle cx="618" cy="690" r="22"/>
    <circle cx="1018" cy="738" r="18"/>
  </g>
  <rect width="1920" height="1080" fill="#000000" opacity=".18"/>
</svg>
