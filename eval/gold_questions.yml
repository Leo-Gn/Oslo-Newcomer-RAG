version: 1
description: Small release-check dataset for the Oslo newcomer RAG demo.

thresholds:
  context_precision: 0.60
  context_recall: 0.60
  faithfulness: 0.80
  answer_relevance: 0.75
  citation_coverage: 0.95
  refusal_correctness: 1.00
  language_match: 0.90

cases:
  - id: greeting_english
    question: hi
    ui_language: en
    retrieval_language: en
    expected_refusal: false
    expected_retrieval: false
    answer_keywords:
      - help
      - Oslo

  - id: skilled_worker_basics
    question: What should a skilled worker check before applying for a residence permit in Norway?
    ui_language: en
    retrieval_language: en
    expected_refusal: false
    expected_owners:
      - UDI
    expected_categories:
      - immigration
    answer_keywords:
      - skilled worker
      - job offer
      - qualifications

  - id: tax_card_after_arrival
    question: I moved to Oslo for work. Where should I check information about getting a tax deduction card?
    ui_language: en
    retrieval_language: en
    expected_refusal: false
    expected_owners:
      - Skatteetaten
      - SUA
    expected_categories:
      - tax
      - work
    answer_keywords:
      - tax deduction card
      - Skatteetaten

  - id: unsupported_second_hand_furniture
    question: Where can I buy second-hand furniture near Grünerløkka this weekend?
    ui_language: en
    retrieval_language: en
    expected_refusal: true
    answer_keywords:
      - not enough
      - official

  - id: mixed_language_tax_card
    question: Jeg skal jobbe i Oslo. Where can I check tax deduction card information?
    ui_language: "no"
    retrieval_language: en
    expected_refusal: false
    expected_owners:
      - Skatteetaten
      - SUA
    expected_categories:
      - tax
      - work
    answer_keywords:
      - skattekort
      - skatteetaten

  - id: norwegian_tax_card
    question: Hvordan får jeg skattekort når jeg skal jobbe i Oslo?
    ui_language: "no"
    retrieval_language: en
    expected_refusal: false
    expected_owners:
      - Skatteetaten
      - SUA
    expected_categories:
      - tax
      - work
    answer_keywords:
      - skattekort
      - skatteetaten

  - id: norwegian_citizenship_check
    question: Hvor kan jeg sjekke når jeg kan søke om norsk statsborgerskap?
    ui_language: "no"
    retrieval_language: en
    expected_refusal: false
    expected_owners:
      - UDI
    expected_categories:
      - immigration
    answer_keywords:
      - statsborgerskap
      - UDI

  - id: follow_up_student_housing
    question: Anywhere else?
    ui_language: en
    retrieval_language: en
    expected_refusal: false
    session_history:
      - role: user
        content: Where can students find housing support?
      - role: assistant
        content: Students can check SiO student housing and Oslo accommodation pages.
    expected_owners:
      - SiO
      - Oslo kommune
    expected_categories:
      - student_services
      - municipal_services
    answer_keywords:
      - housing
      - student

  - id: follow_up_d_number_appointment
    question: Do I have to book an appointment to get it?
    ui_language: en
    retrieval_language: en
    expected_refusal: false
    session_history:
      - role: user
        content: I just got a job in Oslo. How do I get a D-number?
      - role: assistant
        content: D numbers depend on your residence permit and official registration route.
    expected_owners:
      - Skatteetaten
      - SUA
    expected_categories:
      - civil_registration
      - work
    answer_keywords:
      - appointment
      - D number

  - id: follow_up_study_permit_funds
    question: Hvor mye penger må jeg bevise at jeg har for å få tillatelsen?
    ui_language: "no"
    retrieval_language: en
    expected_refusal: false
    session_history:
      - role: user
        content: Hei! Jeg er en internasjonal student fra et land utenfor EU. Hvordan søker jeg om studietillatelse i Norge?
      - role: assistant
        content: Du kan søke om studietillatelse gjennom UDI.
    expected_owners:
      - UDI
    expected_categories:
      - immigration
    answer_keywords:
      - penger
      - UDI

  - id: follow_up_study_permit_work
    question: Kan jeg jobbe deltid mens jeg studerer her?
    ui_language: "no"
    retrieval_language: en
    expected_refusal: false
    session_history:
      - role: user
        content: Hvordan søker jeg om studietillatelse i Norge?
      - role: assistant
        content: UDI forklarer studietillatelse og regler for studenter.
    expected_owners:
      - UDI
    expected_categories:
      - immigration
    answer_keywords:
      - jobbe
      - studerer

  - id: follow_up_sio_waiting_list
    question: Hvor lang er ventelisten?
    ui_language: "no"
    retrieval_language: en
    expected_refusal: false
    session_history:
      - role: user
        content: How do I apply for student housing through SiO?
      - role: assistant
        content: You can apply for student housing through SiO.
    expected_owners:
      - SiO
    expected_categories:
      - student_services
    answer_keywords:
      - bolig
      - SiO

  - id: follow_up_dagpenger_after_short_job
    question: What if I get a job, but then lose it after 3 months? Can I get dagpenger then?
    ui_language: en
    retrieval_language: en
    expected_refusal: false
    expected_legal_disclaimer: true
    session_history:
      - role: user
        content: I am an EU citizen who just moved to Oslo to look for work. Am I eligible for unemployment benefits right now?
      - role: assistant
        content: NAV explains jobseeker registration and unemployment benefits.
    expected_owners:
      - NAV
    expected_categories:
      - work
      - welfare
    answer_keywords:
      - dagpenger
      - NAV

  - id: personal_tax_record_refusal
    question: My personal ID number is 120590 12345. Can you check my tax records to see if I owe money?
    ui_language: en
    retrieval_language: en
    expected_refusal: true
    expected_retrieval: false
    answer_keywords:
      - cannot check
      - personal records

  - id: permanent_residence_legal_risk
    question: Can I get permanent residence if I have lived in Norway for three years, and where should I check the rules?
    ui_language: en
    retrieval_language: en
    expected_refusal: false
    expected_legal_disclaimer: true
    expected_owners:
      - UDI
    expected_categories:
      - immigration
    answer_keywords:
      - permanent residence
      - legal advice
